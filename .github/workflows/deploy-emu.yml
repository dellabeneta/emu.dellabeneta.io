name: CI/CD — RetroVault

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'script.js'
      - 'style.css'
      - 'favicon.ico'
      - 'tests/**'
      - '.github/workflows/**'

jobs:

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Unit — estrutura PLATFORMS[]
        run: node tests/unit/platforms.js

      - name: Unit — i18n PT/EN
        run: node tests/unit/i18n.js

      - name: Infra — catálogo de ROMs (valida no S3)
        run: node tests/infra/catalog.js

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync files to S3
        run: |
          aws s3 cp index.html  s3://emu.dellabeneta.io/index.html
          aws s3 cp data.js     s3://emu.dellabeneta.io/data.js
          aws s3 cp script.js   s3://emu.dellabeneta.io/script.js
          aws s3 cp style.css   s3://emu.dellabeneta.io/style.css
          aws s3 cp favicon.ico s3://emu.dellabeneta.io/favicon.ico

      - name: Purge Cloudflare Cache
        uses: jakejarvis/cloudflare-purge-action@v0.3.0
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          PURGE_URLS: '["https://emu.dellabeneta.io/index.html","https://emu.dellabeneta.io/data.js","https://emu.dellabeneta.io/script.js","https://emu.dellabeneta.io/style.css","https://emu.dellabeneta.io/favicon.ico"]'

  smoke:
    name: Smoke Tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Infra — segurança Cloudflare
        run: bash tests/infra/security.sh
