<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> RETROVAULT </title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" /> 
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=VT323&display=swap"
    rel="stylesheet" />
</head>

<body>

  <div class="scanlines"></div>
  <div class="noise"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-bracket">[</span>
        RETRO<span class="logo-accent">VAULT</span>
        <span class="logo-bracket">]</span>
      </div>
      <div class="header-sub" id="header-stats"></div>
      <div class="header-right">
        <div class="lang-toggle" id="lang-toggle">
          <button class="lang-btn active" data-lang="pt">PT</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </div>
    <div class="header-line"></div>
  </header>

  <main>
    <div class="controls">
      <div class="controls-title" data-i18n="controlsTitle">// ESCOLHA UMA PLATAFORMA</div>
      <div class="filter-group">
        <div class="btn-group" id="era-filter">
          <button class="filter-btn active" data-era="all" data-i18n="filterAll">TODAS</button>
          <button class="filter-btn" data-era="80s" data-i18n="era80s">Anos 80</button>
          <button class="filter-btn" data-era="90s" data-i18n="era90s">Anos 90</button>
          <button class="filter-btn" data-era="00s" data-i18n="era00s">Anos 2000</button>
        </div>
      </div>
    </div>

    <div class="carousel-section">
      <div class="carousel-container" id="carousel-container">
        <div class="carousel-track" id="carousel-track"></div>
      </div>
      <button class="nav-btn nav-left" id="nav-left" aria-label="Anterior">&#9664;</button>
      <button class="nav-btn nav-right" id="nav-right" aria-label="Próximo">&#9654;</button>
    </div>

    <div class="detail-panel" id="detail-panel">
      <div class="detail-inner" id="detail-inner">
        <div class="detail-placeholder" data-i18n="placeholder">// SELECIONE UMA PLATAFORMA</div>
      </div>
    </div>

    <!-- Grid removido -->
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-block footer-beta">
        <span class="beta-badge">BETA</span>
      </div>
      <div class="footer-block footer-keys">
        <div class="key-list">
          <span class="key-item"><kbd>←</kbd><kbd>→</kbd> <span data-i18n="footerKeyPlatforms">plataformas</span></span>
          <span class="key-item"><kbd>↑</kbd><kbd>↓</kbd> <span data-i18n="footerKeyGames">jogos</span></span>
          <span class="key-item"><kbd>Enter</kbd> <span data-i18n="footerKeyPlay">jogar</span></span>
          <span class="key-item"><kbd>J</kbd> <span data-i18n="footerKeySearch">buscar jogo</span></span>
        </div>
      </div>
      <div class="footer-block footer-gamepad">
        <div class="key-list">
          <button class="key-item footer-joystick-btn" id="joystick-info-btn" aria-haspopup="dialog">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="opacity:0.7;flex-shrink:0">
              <path d="M17 6H7a6 6 0 0 0 0 12h10a6 6 0 0 0 0-12zm-9 7H7v1a1 1 0 0 1-2 0v-1H4a1 1 0 0 1 0-2h1v-1a1 1 0 0 1 2 0v1h1a1 1 0 0 1 0 2zm6.5 1a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
            </svg>
            <span data-i18n="footerJoystick">Compatibilidade com Joysticks</span>
          </button>
        </div>
      </div>
      <div class="footer-block footer-links">
        <a href="https://github.com/dellabeneta/emu.dellabeneta.io" target="_blank" rel="noopener" class="footer-github" aria-label="GitHub">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          <span>GitHub</span>
        </a>
      </div>
    </div>
  </footer>



  <!-- MOBILE: bottom sheet de confirmação -->
  <div id="mobile-sheet-backdrop"></div>
  <div id="mobile-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-game-title" id="sheet-game-title"></div>
    <div class="sheet-game-meta" id="sheet-game-meta"></div>
    <div class="sheet-actions">
      <button id="sheet-play">JOGAR</button>
      <button id="sheet-cancel">CANCELAR</button>
    </div>
  </div>

  <div id="emulator-overlay">
    <div id="emulator-container"></div>
    
    <div class="boot-screen" id="boot-screen">
      <canvas id="boot-canvas"></canvas>
    <div class="boot-scanline"></div>
      <div class="boot-logo">
        <!-- <span class="logo-bracket"></span> -->
        RETRO<span class="logo-accent">VAULT</span>
        <!-- <span class="logo-bracket"></span> -->
      </div>
    </div>

    <button class="exit-emulator" id="exit-emulator">
      <span class="exit-icon">✕</span>
      <span class="exit-text">VOLTAR AO VAULT</span>
    </button>
  </div>

  <!-- Modal: joystick info -->
  <div id="joystick-backdrop" role="presentation"></div>
  <div id="joystick-modal" role="dialog" aria-modal="true" aria-labelledby="joystick-modal-title">
    <div class="joystick-modal-title" id="joystick-modal-title" data-i18n="joystickModalTitle">JOYSTICK NO BROWSER</div>
    <div class="joystick-modal-body">
      <p data-i18n="joystickModalP1"></p>
      <p data-i18n="joystickModalP2"></p>
    </div>
    <button class="joystick-modal-close" id="joystick-modal-close" data-i18n="joystickModalClose">FECHAR</button>
  </div>

  <script src="script.js"></script>

</body>

</html>
